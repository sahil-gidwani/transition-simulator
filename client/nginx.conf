server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Docker's embedded DNS; re-resolve `server` at request time so the proxy
    # survives API-container recreation instead of pinning a stale IP at boot.
    resolver 127.0.0.11 valid=10s;
    set $api_upstream http://server:8000;

    # No URI on proxy_pass: the original request URI (incl. query string) is
    # forwarded unchanged, so /api/health hits the backend's /api/health.
    location /api/ {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed build artifacts: cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # The SPA shell must always revalidate so deploys take effect.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback for BrowserRouter routes (/search, /players/:id, ...).
    location / {
        try_files $uri /index.html;
    }
}
